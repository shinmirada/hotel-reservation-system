databases:
  - name: hotel-db
    plan: free
    databaseName: hotel_db
    user: admin

services:
  - type: web
    name: hotel-reservation-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx ts-node src/sync.ts && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString
      - key: JWT_SECRET
        value: supersecretkey
      - key: NODE_ENV
        value: production
